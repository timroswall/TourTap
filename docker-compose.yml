services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    image: ghcr.io/timroswall/tourtap/migrate:latest
    command:
      - -dir
      - /migrations
      - postgres
      - ${POSTGRES_URL}
      - up
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    image: ghcr.io/timroswall/tourtap/backend:latest
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # seed_demo_user:
  #   image: ghcr.io/timroswall/tourtap/seed:latest
  #   depends_on:
  #     backend:
  #       condition: service_started
  #   restart: "no"

  frontend:
    image: ghcr.io/timroswall/tourtap/frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
