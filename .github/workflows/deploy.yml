name: Build & Deploy

on:
  push:
    branches:
      - main
      - feature/github-actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend
        run: |
          docker build --no-cache \
            -t ghcr.io/${{ github.repository_owner }}/tourtap/backend:latest \
            ./backend
          docker push ghcr.io/${{ github.repository_owner }}/tourtap/backend:latest

      - name: Frontend
        run: |
          docker build --no-cache \
            -t ghcr.io/${{ github.repository_owner }}/tourtap/frontend:latest \
            ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/tourtap/frontend:latest

      - name: Migrations
        run: |
          docker build --no-cache \
            -f backend/Dockerfile.migrate \
            -t ghcr.io/${{ github.repository_owner }}/tourtap/migrate:latest \
            ./backend
          docker push ghcr.io/${{ github.repository_owner }}/tourtap/migrate:latest

      - name: Deploy
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=no ubuntu@$HOST << 'EOF'
            cd ~/tourtap
            git pull
            docker compose pull
            docker compose up -d
          EOF
